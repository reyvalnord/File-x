<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ARM TERMINAL // IDENTITY FORGE V4.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  
  <style>
    /* MEMUAT FONT KUSTOM DARI FILE LOKAL */
    @font-face {
      font-family: 'AgentCustomFont';
      src: url('font.otf') format('opentype');
    }

    :root {
      --bg-color: #02040a;
      --text-main: #a9bccc;
      --color-cyan: #00f3ff;
      --color-cyan-dark: #008b99;
      --primary-color: var(--color-cyan);
      --dim-ratio: rgba(2, 4, 10, 0.85);
      --primary-rgb: 0, 243, 255;
      --bg-rgb: 0, 26, 29;
      --red: #ff003c;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      transition: all 0.3s ease;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Share Tech Mono', monospace;
      font-size: 16px;
      min-height: 100vh;
      overflow-x: hidden;
      perspective: 1000px;
    }

    /* Latar Belakang & Grid Efek */
    body::before {
      content: " ";
      display: block;
      position: fixed;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                  linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 100;
      pointer-events: none;
      background-size: 100% 2px, 3px 100%;
    }

    .bg-container {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1;
      background: radial-gradient(circle at center, rgba(var(--bg-rgb), 0.6) 0%, var(--bg-color) 80%);
    }

    /* Tipografi Header */
    header {
      text-align: center;
      padding: 3rem 1rem 1rem;
      position: relative;
    }

    .hud-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.5rem;
      color: var(--primary-color);
      text-transform: uppercase;
      letter-spacing: 6px;
      text-shadow: 0 0 15px rgba(var(--primary-rgb), 0.6);
      margin-bottom: 0rem;
    }

    /* Layout Utama */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr 1.2fr; 
      gap: 40px;
    }

    @media (max-width: 850px) {
      main { grid-template-columns: 1fr; }
    }

    /* Panel Siber (Sections) */
    section {
      background: var(--dim-ratio);
      border: 1px solid rgba(var(--primary-rgb), 0.15);
      border-top: 1px solid rgba(var(--primary-rgb), 0.4);
      padding: 2.5rem;
      position: relative;
      backdrop-filter: blur(12px);
      clip-path: polygon(25px 0, 100% 0, 100% calc(100% - 25px), calc(100% - 25px) 100%, 0 100%, 0 25px);
      box-shadow: inset 0 0 30px rgba(var(--primary-rgb), 0.05);
    }

    section::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 40px; height: 3px;
      background: var(--primary-color);
      box-shadow: 0 0 10px var(--primary-color);
    }

    h2 {
      font-family: 'Orbitron', sans-serif;
      color: #fff;
      font-size: 1rem;
      letter-spacing: 3px;
      margin-bottom: 2rem;
      text-transform: uppercase;
      border-bottom: 1px dashed rgba(var(--primary-rgb), 0.3);
      padding-bottom: 8px;
      display: block;
      width: 100%;
    }

    /* Elemen Formulir */
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 25px;
    }

    label {
      font-size: 13px;
      color: var(--primary-color);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: bold;
    }

    input[type="text"] {
      padding: 14px;
      background: rgba(var(--primary-rgb), 0.02);
      border: 1px solid rgba(var(--primary-rgb), 0.2);
      border-left: 4px solid var(--color-cyan-dark);
      color: #fff;
      font-family: 'Share Tech Mono', monospace;
      font-size: 18px;
      outline: none;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    input[type="text"]:focus {
      background: rgba(var(--primary-rgb), 0.05);
      border-color: var(--primary-color);
      border-left-color: var(--primary-color);
      box-shadow: inset 0 0 15px rgba(var(--primary-rgb), 0.15);
    }

    /* Kustomisasi Upload File */
    input[type="file"] { display: none; }
    
    .custom-file-upload {
      display: inline-block;
      padding: 12px 20px;
      cursor: pointer;
      background: rgba(var(--primary-rgb), 0.05);
      border: 1px dashed var(--primary-color);
      color: var(--primary-color);
      text-align: center;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 2px;
      font-size: 14px;
      transition: all 0.3s;
    }

    .custom-file-upload:hover {
      background: rgba(var(--primary-rgb), 0.15);
      text-shadow: 0 0 8px var(--primary-color);
    }

    .file-name-display {
      font-size: 12px;
      color: var(--text-main);
      margin-top: 5px;
      opacity: 0.7;
      word-break: break-all;
    }

    /* Styling Taktis Range Slider */
    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      background: transparent;
      margin: 10px 0;
    }
    input[type=range]:focus { outline: none; }
    input[type=range]::-webkit-slider-runnable-track {
      width: 100%;
      height: 2px;
      cursor: pointer;
      background: rgba(var(--primary-rgb), 0.4);
    }
    input[type=range]::-webkit-slider-thumb {
      height: 20px;
      width: 10px;
      background: var(--primary-color);
      cursor: pointer;
      -webkit-appearance: none;
      margin-top: -9px;
      box-shadow: 0 0 10px var(--primary-color);
      border-radius: 0; 
    }

    .slider-container {
      display: grid;
      gap: 15px;
      background: rgba(0, 0, 0, 0.4);
      padding: 20px;
      border: 1px solid rgba(var(--primary-rgb), 0.15);
      border-left: 2px solid var(--color-cyan-dark);
    }
    .slider-row {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .slider-row span {
      width: 70px;
      font-size: 12px;
      color: #fff;
      letter-spacing: 1px;
    }

    /* PANEL UNTUK MENYALIN TEKS BIODATA AGENT */
    .copy-data-box {
      background: rgba(0, 243, 255, 0.02);
      border: 1px dashed rgba(var(--primary-rgb), 0.3);
      padding: 15px;
      font-size: 14px;
      color: #fff;
      cursor: pointer;
      position: relative;
    }
    .copy-data-box:hover {
      background: rgba(0, 243, 255, 0.05);
      border-color: var(--primary-color);
    }
    .copy-data-box pre {
      font-family: 'Share Tech Mono', monospace;
      line-height: 1.6;
      color: #a9bccc;
    }
    .copy-data-box .click-notif {
      position: absolute;
      top: 5px; right: 8px;
      font-size: 10px;
      color: var(--primary-color);
      text-transform: uppercase;
      opacity: 0.6;
    }

    /* Tombol Utama */
    .btn-cyber {
      display: inline-block;
      width: 100%;
      padding: 16px;
      background: linear-gradient(90deg, rgba(var(--primary-rgb), 0.1) 0%, rgba(var(--primary-rgb), 0.2) 100%);
      color: var(--primary-color);
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 3px;
      border: 1px solid var(--primary-color);
      cursor: pointer;
      position: relative;
      clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
      margin-top: 10px;
    }

    .btn-cyber:hover {
      background: var(--primary-color);
      color: #000;
      box-shadow: 0 0 25px rgba(var(--primary-rgb), 0.8);
    }

    /* Kotak Pratinjau Kanvas */
    .glitch-frame {
      position: relative;
      width: 100%;
      border: 1px solid rgba(var(--primary-rgb), 0.3);
      background: rgba(0,0,0,0.5);
      box-shadow: 0 0 30px rgba(var(--primary-rgb), 0.15);
      padding: 8px;
      aspect-ratio: 1 / 1; 
    }

    .scanlines::after {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.15),
        rgba(0, 0, 0, 0.15) 1px,
        transparent 1px,
        transparent 2px
      );
      pointer-events: none;
      z-index: 10;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      background-color: #000;
      object-fit: cover;
      position: relative;
      z-index: 1;
    }

    /* Modal Error Pop-up */
    .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(2, 0, 5, 0.9);
        backdrop-filter: blur(8px);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 999;
        opacity: 0;
        visibility: hidden;
    }
    .modal-overlay.show {
        opacity: 1;
        visibility: visible;
    }
    .cyber-modal {
        background: #0d0406;
        border: 1px solid var(--red);
        padding: 35px;
        max-width: 450px;
        width: 85%;
        text-align: center;
        box-shadow: 0 0 30px rgba(255, 0, 60, 0.2), inset 0 0 15px rgba(255, 0, 60, 0.1);
        clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
    }
    .modal-warning-tag {
        display: inline-block;
        padding: 6px 20px;
        background: var(--red);
        color: #000;
        font-family: 'Orbitron', sans-serif;
        font-weight: bold;
        letter-spacing: 3px;
        margin-bottom: 25px;
        font-size: 14px;
    }
    .cyber-modal p {
        font-size: 16px;
        color: #ffb3c1;
        margin-bottom: 30px;
        letter-spacing: 1px;
    }
    .modal-close-btn {
        appearance: none;
        background: transparent;
        border: 1px solid var(--red);
        color: var(--red);
        padding: 14px 30px;
        font-family: 'Orbitron', sans-serif;
        font-weight: bold;
        font-size: 14px;
        letter-spacing: 3px;
        text-transform: uppercase;
        cursor: pointer;
        clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
    }
    .modal-close-btn:hover {
        background: var(--red);
        color: #000;
        box-shadow: 0 0 20px rgba(255, 0, 60, 0.5);
    }

    .font-preload {
      font-family: 'AgentCustomFont';
      visibility: hidden;
      position: absolute;
    }
  </style>
</head>
<body>

  <div class="bg-container"></div>
  <div class="font-preload">Loading Font...</div>

  <div class="modal-overlay" id="errorModal">
      <div class="cyber-modal">
          <div class="modal-warning-tag">CRITICAL_ERROR</div>
          <p id="modalErrorMessage">SYSTEM ERROR: VISUAL_DATA_MISSING</p>
          <button class="modal-close-btn" id="modalCloseBtn">>> ACKNOWLEDGE</button>
      </div>
  </div>

  <header>
    <div style="font-size: 12px; color: var(--primary-color); margin-bottom: 8px; letter-spacing: 3px;">SYS.OP // IDENTIFY</div>
    <h1 class="hud-title">GHOST</h1>
  </header>

  <main>
    <section>
      <h2>01 // Data Entry</h2>
      
      <div class="input-group">
        <label>> CODE ACCESS</label>
        <input type="text" id="agentCode" value="" oninput="requestDraw()" maxlength="10">
      </div>

      <div class="input-group">
        <label>> UNGGAH FOTO</label>
        <label for="agentPhoto" class="custom-file-upload" id="uploadLabel">
          [+] UPLOAD GAMBAR
        </label>
        <input type="file" id="agentPhoto" accept="image/*" onchange="handlePhotoUpload(event)">
        <div id="fileNameDisplay" class="file-name-display">Status: Menunggu file target...</div>
      </div>

      <div class="input-group" style="margin-top: 15px;">
        <label>> PENGATURAN FOTO</label>
        <div class="slider-container">
          <div class="slider-row">
            <span>ZOOM</span>
            <input type="range" id="optZoom" min="0.5" max="3" step="0.05" value="1" oninput="requestDraw()" onchange="requestDraw(true)">
          </div>
          <div class="slider-row">
            <span>↑ ↓</span>
            <input type="range" id="optY" min="-400" max="400" step="5" value="0" oninput="requestDraw()" onchange="requestDraw(true)">
          </div>
        </div>
      </div>

      <div class="input-group" style="margin-top: 20px;">
        <label>> ATB (TAP TO COPY)</label>
        <div class="copy-data-box" onclick="copyAgentText()">
          <span class="click-notif" id="copyNotif">[TAP TO COPY]</span>
          <pre id="agentTextToCopy">Ghost, Use if you are an Agent

Putdn  :  Ghost 𝗔𝗥𝗠
Loc/Bio  :  Connected to ARM</pre>
        </div>
      </div>

      <div class="glitch-frame scanlines" style="margin-bottom: 25px;">
        <canvas id="idCanvas" width="1080" height="1080"></canvas>
      </div>

      <button class="btn-cyber" onclick="downloadID()" id="dlBtn">
        >> DOWNLOAD CARD
      </button>
    </section>
  </main>

    <script>
    const canvas = document.getElementById('idCanvas');
    const ctx = canvas.getContext('2d');
    
    // ==========================================
    // PENGATURAN RESOLUSI HD (2x, 3x, atau 4x)
    // ==========================================
    const scaleFactor = 2.5; // <--- UBAH ANGKA INI: 2 untuk HD, 3 untuk Super HD (3K)
    const previewScaleFactor = 1; // Skala ringan dipakai saat geser slider (live preview)

    // Atur resolusi kanvas dikali lipat dari ukuran asli (1080)
    canvas.width = 1080 * scaleFactor;
    canvas.height = 1080 * scaleFactor;
    
    let templateImg = new Image();
    let photoImg = new Image();
    
    const errorModal = document.getElementById('errorModal');
    const modalErrorMessage = document.getElementById('modalErrorMessage');
    const modalCloseBtn = document.getElementById('modalCloseBtn');

    document.fonts.ready.then(function() { drawCanvas(scaleFactor); });

    templateImg.src = 'template.png'; 
    templateImg.onload = () => { drawCanvas(scaleFactor); };

    function triggerCyberAlert(message) {
        modalErrorMessage.innerText = message;
        errorModal.classList.add('show');
    }

    modalCloseBtn.addEventListener('click', () => {
        errorModal.classList.remove('show');
    });

    function copyAgentText() {
        const text = document.getElementById('agentTextToCopy').innerText;
        navigator.clipboard.writeText(text).then(() => {
            const notif = document.getElementById('copyNotif');
            notif.innerText = "[COPIED SUCCESSFUL]";
            notif.style.color = "#00ff66";
            setTimeout(() => {
                notif.innerText = "[TAP TO COPY]";
                notif.style.color = "var(--primary-color)";
            }, 2000);
        });
    }

    function handlePhotoUpload(event) {
        const file = event.target.files[0];
        const uploadLabel = document.getElementById('uploadLabel');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        
        if (file) {
            uploadLabel.innerText = ">> UPLOAD BERHASIL";
            uploadLabel.style.backgroundColor = "rgba(0, 243, 255, 0.15)";
            fileNameDisplay.innerText = "Target: " + file.name;
            fileNameDisplay.style.color = "var(--primary-color)";

            const reader = new FileReader();
            reader.onload = function(e) {
                photoImg.src = e.target.result;
                photoImg.onload = () => {
                    document.getElementById('optZoom').value = 1;
                    document.getElementById('optY').value = 0;
                    drawCanvas(scaleFactor);
                }
            }
            reader.readAsDataURL(file);
        }
    }

    // ==========================================
    // THROTTLE: hanya 1 render per frame (rAF),
    // pakai resolusi ringan selama drag berlangsung,
    // lalu render ulang di resolusi HD saat slider dilepas.
    // ==========================================
    let rafPending = false;
    let isHDPending = false;

    function requestDraw(forceHD) {
        if (forceHD) isHDPending = true;
        if (rafPending) return;
        rafPending = true;
        requestAnimationFrame(() => {
            rafPending = false;
            if (isHDPending) {
                isHDPending = false;
                drawCanvas(scaleFactor);
            } else {
                drawCanvas(previewScaleFactor);
            }
        });
    }

    function drawCanvas(renderScale) {
        const isHD = renderScale === scaleFactor || renderScale === undefined;

        // 1. Reset matriks sebelum menggambar ulang agar scale tidak menumpuk
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 2. Terapkan perkalian skala (selalu sama, resolusi kanvas tetap konsisten)
        ctx.scale(scaleFactor, scaleFactor);

        // 3. Kualitas smoothing: tinggi hanya saat render HD final (lebih cepat saat drag)
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = isHD ? "high" : "low";

        // Gambar Base Background
        ctx.fillStyle = "#000000";
        ctx.fillRect(0, 0, 1080, 1080); // Tetap pakai base 1080, akan dikalikan otomatis

        // LAYER FOTO
        if (photoImg.src && photoImg.complete && photoImg.naturalHeight !== 0) {
            ctx.save(); 
            // Filter grayscale/contrast itu berat di kanvas besar — pakai hanya saat HD final,
            // dilewati saat live-preview supaya geser slider tetap mulus.
            if (isHD) {
                ctx.filter = 'grayscale(20%) contrast(1.1)';
            }

            const centerX = 740; 
            const centerY = 330; 

            const zoomVal = parseFloat(document.getElementById('optZoom').value);
            const offsetY = parseFloat(document.getElementById('optY').value); 

            const imgRatio = photoImg.height / photoImg.width;
            
            const baseW = 460; 
            const baseH = baseW * imgRatio;

            const finalW = baseW * zoomVal;
            const finalH = baseH * zoomVal;

            const drawX = centerX - (finalW / 2);
            const drawY = (centerY - (finalH / 2)) + offsetY;

            ctx.drawImage(photoImg, drawX, drawY, finalW, finalH);
            ctx.restore(); 
        }

        // LAYER TEMPLATE
        if (templateImg.complete && templateImg.naturalHeight !== 0) {
            ctx.drawImage(templateImg, 0, 0, 1080, 1080);
        } else {
             ctx.fillStyle = "#00f3ff";
             ctx.font = "30px 'Share Tech Mono'";
             ctx.textAlign = "center";
             ctx.fillText("Menunggu template.png...", 1080/2, 1080/2);
        }

        // LAYER TEKS
        const rawCode = document.getElementById('agentCode').value.toUpperCase();
        
        if (rawCode) {
            ctx.font = "bold 65px 'AgentCustomFont', 'Orbitron', sans-serif"; 
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            const textX = 340; 
            const textY = 815;  

            ctx.shadowColor = "rgba(0, 0, 0, 0.8)"; 
            ctx.shadowBlur = 10;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;

            ctx.fillStyle = "#ffffff"; 
            ctx.fillText(rawCode, textX, textY);
            
            ctx.shadowColor = "transparent";
        }
    }

    function downloadID() {
        if (!photoImg.src || photoImg.src === "") {
            triggerCyberAlert('SYSTEM ERROR: TARGET VISUAL NOT FOUND');
            return;
        }

        const btn = document.getElementById('dlBtn');
        const originalText = btn.innerText;
        
        btn.innerText = ">> MENGUNDUH DATA...";
        btn.style.background = "#fff";
        btn.style.color = "#000";

        // Pastikan render HD final sebelum export, baru download.
        drawCanvas(scaleFactor);
        
        setTimeout(() => {
            const link = document.createElement('a');
            // Menambahkan nama file agar unik saat di-download
            link.download = 'GHOST_AGENT.png';
            link.href = canvas.toDataURL('image/png', 1.0); // Kualitas maksimal 1.0
            link.click();
            
            btn.innerText = originalText;
            btn.style.background = "";
            btn.style.color = "";
        }, 800);
    }
  </script>
      
</body>
</html>
