
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ARCHIVE DATABASE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #02040a;
      --text-main: #a9bccc;
      --color-cyan: #00f3ff;
      --color-red: #ff3b3b;
      --primary-color: var(--color-cyan);
      --dim-ratio: rgba(2, 6, 15, 0.7);
      --primary-rgb: 0, 243, 255;
      --bg-rgb: 0, 26, 29;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* KUNCI UTAMA: body diset 100% tinggi viewport untuk mencegah isinya memanjang tidak wajar di background pop-up */
    body, html {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Share Tech Mono', monospace;
      font-size: 16px;
      height: 100%;
      width: 100%;
      overflow-x: hidden;
      perspective: 1000px;
    }

    /* Container utama dibuat scrolling independen */
    .main-wrapper {
      height: 100%;
      width: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: " ";
      display: block;
      position: fixed;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                  linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
      z-index: 999;
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
    }

    .bg-container {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1;
      overflow: hidden;
      background: radial-gradient(circle at center, rgba(var(--bg-rgb), 0.6) 0%, var(--bg-color) 90%);
    }

    .grid-3d {
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background-image: 
        linear-gradient(rgba(var(--primary-rgb), 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(var(--primary-rgb), 0.06) 1px, transparent 1px);
      background-size: 40px 40px;
      transform: rotateX(55deg);
      animation: gridScroll 15s linear infinite;
      opacity: 0.5;
    }

    @keyframes gridScroll {
      0% { transform: rotateX(55deg) translateY(0); }
      100% { transform: rotateX(55deg) translateY(40px); }
    }

    header {
      text-align: center;
      padding: 4rem 1rem 3rem;
      position: relative;
    }

    .hud-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.8rem;
      color: var(--primary-color);
      text-transform: uppercase;
      letter-spacing: 6px;
      text-shadow: 0 0 15px rgba(var(--primary-rgb), 0.8);
      margin-bottom: 0.5rem;
      position: relative;
      display: inline-block;
      animation: slight-glitch 4s infinite;
    }

    @keyframes slight-glitch {
      0%, 96%, 98%, 100% { transform: translate(0); text-shadow: 0 0 15px rgba(var(--primary-rgb), 0.8); }
      97% { transform: translate(-2px, 1px); text-shadow: -2px 0 var(--color-red), 2px 0 var(--color-cyan); }
      99% { transform: translate(2px, -1px); text-shadow: 2px 0 var(--color-red), -2px 0 var(--color-cyan); }
    }

    .subtitle {
      font-size: 13px;
      letter-spacing: 4px;
      color: #fff;
      opacity: 0.7;
      text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
    }

    .matrix-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    .folder-grid {
      display: grid;
      gap: 35px;
      margin-bottom: 35px;
    }

    .grid-row-1 { grid-template-columns: repeat(3, 1fr); }
    .grid-row-2 { grid-template-columns: repeat(2, 1fr); max-width: 580px; margin: 0 auto; }

    @media (max-width: 768px) {
      .grid-row-1, .grid-row-2 { grid-template-columns: 1fr; max-width: 100%; }
      .hud-title { font-size: 2rem; }
    }

    .folder-card {
      background: var(--dim-ratio);
      border: 1px solid rgba(var(--primary-rgb), 0.15);
      padding: 2.5rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      backdrop-filter: blur(12px);
      clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0;
      transform: translateY(30px);
      animation: bootUp 0.6s ease-out forwards;
    }

    .grid-row-1 .folder-card:nth-child(1) { animation-delay: 0.2s; }
    .grid-row-1 .folder-card:nth-child(2) { animation-delay: 0.4s; }
    .grid-row-1 .folder-card:nth-child(3) { animation-delay: 0.6s; }
    .grid-row-2 .folder-card:nth-child(1) { animation-delay: 0.8s; }
    .grid-row-2 .folder-card:nth-child(2) { animation-delay: 1.0s; }

    @keyframes bootUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .folder-card::before {
      content: '';
      position: absolute;
      top: 0; left: 15px;
      width: 40px; height: 2px;
      background: var(--primary-color);
      box-shadow: 0 0 10px var(--primary-color);
      transition: width 0.3s ease;
    }

    .folder-card:hover {
      border-color: rgba(var(--primary-rgb), 0.5);
      background: rgba(0, 243, 255, 0.05);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(var(--primary-rgb), 0.1);
      transform: translateY(-8px);
    }

    .folder-card:hover::before { width: calc(100% - 30px); }

    .folder-icon {
      width: 65px;
      height: 65px;
      margin-bottom: 20px;
      fill: none;
      stroke: rgba(var(--primary-rgb), 0.4);
      stroke-width: 1.2;
      transition: all 0.4s ease;
    }

    .folder-card:hover .folder-icon {
      stroke: var(--primary-color);
      filter: drop-shadow(0 0 8px var(--primary-color));
      transform: scale(1.1);
    }

    .folder-name {
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.15rem;
      color: #fff;
      letter-spacing: 2px;
    }

    .folder-status {
      font-size: 11px;
      color: rgba(var(--primary-rgb), 0.5);
      margin-top: 8px;
      letter-spacing: 1px;
    }

    /* =========================================
       PERBAIKAN FINAL OVERLAY (DIJAMIN PAS DI TENGAH)
       MENGGUNAKAN FLEXBOX FIX DENGAN FIXED POSITION 
       100% viewport.
       ========================================= */
    .overlay {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100dvh;
      background: rgba(1, 3, 7, 0.95);
      backdrop-filter: blur(10px);
      z-index: 10000; /* Z-index dinaikkan jauh lebih tinggi */
      
      display: flex; /* Flexbox pada kontainer layar penuh */
      align-items: center;
      justify-content: center;
      padding: 20px;
      
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* Panel terminal di dalam overlay flexbox */
    .terminal-panel {
      background: #01060d;
      border: 1px solid rgba(var(--primary-rgb), 0.4);
      width: 100%; 
      max-width: 600px;
      
      max-height: calc(100dvh - 40px); /* Kunci mutlak batas tinggi berdasar viewport */
      overflow-y: auto; /* Aktifkan scroll di dalam modal jika isi panjang */
      
      padding: 2.5rem 1.5rem;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.9), 0 0 20px rgba(var(--primary-rgb), 0.15) inset;
      clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
      
      transform: scale(0.9) translateY(20px);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative; /* relative thd flexbox kontainernya */
    }

    .overlay.active .terminal-panel {
      transform: scale(1) translateY(0); /* Muncul tepat di tengah akibat align-items:center */
    }

    .terminal-panel::-webkit-scrollbar { width: 4px; }
    .terminal-panel::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.5); }
    .terminal-panel::-webkit-scrollbar-thumb { background: rgba(var(--primary-rgb), 0.5); }

    .terminal-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 20px;
      width: 80px; height: 3px;
      background: var(--primary-color);
      box-shadow: 0 0 15px var(--primary-color);
    }

    /* Isi Panel */
    .file-header {
      font-family: 'Orbitron', sans-serif;
      font-size: 2rem;
      color: #fff;
      margin-bottom: 1.5rem;
      border-bottom: 1px dashed rgba(var(--primary-rgb), 0.3);
      padding-bottom: 15px;
      text-shadow: 0 0 5px rgba(255, 255, 255, 0.2);
    }

    .meta-line {
      font-size: 1rem;
      line-height: 1.8;
      margin-bottom: 10px;
      display: flex;
    }

    .meta-label {
      color: var(--primary-color);
      width: 120px;
      flex-shrink: 0;
    }

    .meta-val { color: #ffffff; word-break: break-word; }

    .meta-val.corrupted {
      color: var(--color-red);
      text-shadow: 0 0 8px rgba(255, 59, 59, 0.6);
      animation: pulse-red 2s infinite;
    }

    @keyframes pulse-red {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .remarks-box {
      margin-top: 2rem;
    }

    .remarks-title {
      color: var(--primary-color);
      margin-bottom: 10px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .binary-content {
      background: rgba(0, 243, 255, 0.02);
      border: 1px solid rgba(var(--primary-rgb), 0.15);
      border-left: 3px solid rgba(var(--primary-rgb), 0.5);
      padding: 15px;
      font-size: 0.9rem;
      line-height: 1.8;
      letter-spacing: 2px;
      word-break: break-all;
      color: var(--text-main);
      box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
    }

    /* Stealth Link Charlie */
    .stealth-link {
      text-decoration: none;
      color: inherit;
      cursor: text; 
      -webkit-tap-highlight-color: transparent; 
      outline: none;
      display: block;
    }

    .btn-close {
      margin-top: 2rem;
      display: block;
      width: 100%;
      padding: 12px;
      background: rgba(var(--primary-rgb), 0.05);
      color: var(--primary-color);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.9rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      border: 1px solid rgba(var(--primary-rgb), 0.3);
      cursor: pointer;
      clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
      text-align: center;
      transition: all 0.3s ease;
    }

    .btn-close:hover {
      background: var(--primary-color);
      color: #000;
      box-shadow: 0 0 20px rgba(var(--primary-rgb), 0.4);
      border-color: var(--primary-color);
    }

    .system-log {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      text-align: center;
      margin-top: 4rem;
      margin-bottom: 2rem;
      letter-spacing: 2px;
    }
    
    /* Mengunci overflow saat overlay aktif */
    body.modal-open .main-wrapper {
        overflow: hidden;
    }
  </style>
</head>
<body>

  <!-- Wrapper utama ditambahkan untuk menangani scroll hp secara independen -->
  <div class="main-wrapper" id="mainWrapper">

    <div class="bg-container">
      <div class="grid-3d"></div>
    </div>

    <header>
      <div style="font-size: 11px; color: var(--primary-color); margin-bottom: 10px; letter-spacing: 3px;">SYS.OP // SECURE UPLINK ESTABLISHED</div>
      <h1 class="hud-title">ARCHIVE TERMINAL</h1>
      <div class="subtitle">MODULE: <span style="color: var(--primary-color);">MEDIUM_LEVEL0.1</span></div>
    </header>

    <div class="matrix-container">
      <div class="folder-grid grid-row-1">
        <div class="folder-card" onclick="openFile('alpha')">
          <svg class="folder-icon" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
          <div class="folder-name">Record_Alpha</div>
          <div class="folder-status">STATUS: LOCKED</div>
        </div>
        <div class="folder-card" onclick="openFile('bravo')">
          <svg class="folder-icon" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
          <div class="folder-name">Record_Bravo</div>
          <div class="folder-status">STATUS: LOCKED</div>
        </div>
        <div class="folder-card" onclick="openFile('charlie')">
          <svg class="folder-icon" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
          <div class="folder-name">Record_Charlie</div>
          <div class="folder-status">STATUS: LOCKED</div>
        </div>
      </div>
      <div class="folder-grid grid-row-2">
        <div class="folder-card" onclick="openFile('delta')">
          <svg class="folder-icon" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
          <div class="folder-name">Record_Delta</div>
          <div class="folder-status">STATUS: LOCKED</div>
        </div>
        <div class="folder-card" onclick="openFile('echo')">
          <svg class="folder-icon" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
          <div class="folder-name">Record_Echo</div>
          <div class="folder-status">STATUS: LOCKED</div>
        </div>
      </div>
    </div>

    <div class="system-log">ENCRYPTED LOG // &copy; 2026 ARM AREA // STANDBY MODE</div>

  </div> <!-- End of main-wrapper -->

  <!-- Struktur Overlay Flexbox penuh layar -->
  <div class="overlay" id="fileOverlay" onclick="closeOverlay()">
    <div class="terminal-panel" id="terminalPanel" onclick="event.stopPropagation()">
      <div id="fileContent"></div>
      <button class="btn-close" onclick="closeOverlay()">>> RETURN TO SECURE TERMINAL</button>
    </div>
  </div>

  <script>
    const database = {
      alpha: { header: "01 / #ALPHA", name: "[Corrupted]", status: "Record Unavailable", signal: "15.00 01/01/2025", remarks: "01000001 01010010 01000011 01001000 01001001 01010110 01000101 00100000 01001110 01001111 01010100 00100000 01001000 01000101 01010010 01000101", isSpecial: false },
      bravo: { header: "02 / #BRAVO", name: "[Corrupted]", status: "Record Unavailable", signal: "16.00 01/01/2025", remarks: "01000110 01000001 01001100 01010011 01000101 00100000 01010100 01010010 01000011 01000011 01000101", isSpecial: false },
      charlie: { header: "03 / #CHARLIE", name: "[Corrupted]", status: "Existence Unverified", signal: "17.00 01/01/2025", remarks: "01010100 01001000 01000101 00100000 01001011 01000101 01000101 01010000 01000101 01010010 00100000 01010010 01000101 01001101 01000001 01001001 01001110 01010011", isSpecial: true, targetUrl: "in.html" },
      delta: { header: "04 / #DELTA", name: "[Corrupted]", status: "Record Unavailable", signal: "18.00 01/01/2025", remarks: "01001011 01000101 01000101 01010000 00100000 01010011 01000101 01000001 01010010 01000011 01001000 01001001 01001110 01000111", isSpecial: false },
      echo: { header: "05 / #ECHO", name: "[Corrupted]", status: "Record Unavailable", signal: "19.00 01/01/2025", remarks: "01000100 01000101 01000001 01000100 00100000 01000101 01001110 01000100", isSpecial: false }
    };

    const overlay = document.getElementById('fileOverlay');
    const contentContainer = document.getElementById('fileContent');

    function openFile(id) {
      const data = database[id];
      if (!data) return;

      let remarksHTML = '';
      
      if (data.isSpecial) {
        remarksHTML = `<div class="binary-content"><a href="${data.targetUrl}" class="stealth-link">${data.remarks}</a></div>`;
      } else {
        remarksHTML = `<div class="binary-content">${data.remarks}</div>`;
      }

      contentContainer.innerHTML = `
        <div class="file-header">${data.header}</div>
        <div class="meta-line"><span class="meta-label">Name</span><span style="color:var(--primary-color); margin-right: 10px;">:</span><span class="meta-val corrupted">${data.name}</span></div>
        <div class="meta-line"><span class="meta-label">Status</span><span style="color:var(--primary-color); margin-right: 10px;">:</span><span class="meta-val">${data.status}</span></div>
        <div class="meta-line"><span class="meta-label">Last Signal</span><span style="color:var(--primary-color); margin-right: 10px;">:</span><span class="meta-val">${data.signal}</span></div>
        <div class="remarks-box">
          <div class="remarks-title">Remarks :</div>
          ${remarksHTML}
        </div>
      `;

      // Kunci scroll body dan tampilkan overlay
      document.body.classList.add('modal-open');
      overlay.classList.add('active');
    }

    function closeOverlay() {
      // Buka kunci scroll body dan sembunyikan overlay
      document.body.classList.remove('modal-open');
      overlay.classList.remove('active');
    }
  </script>
</body>
</html>
